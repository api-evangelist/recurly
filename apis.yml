aid: recurly
name: Recurly
description: >-
  Recurly is a subscription management and recurring billing platform that
  handles signups, plans, add-ons, coupons, dunning, invoicing, tax,
  revenue recognition, and analytics for subscription businesses. The
  Recurly v3 REST API gives developers full access to accounts,
  subscriptions, invoices, transactions, plans, and webhooks, with a
  versioned `Accept` header for API revisions. Authentication uses HTTP
  Basic with a site-scoped API key.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Subscriptions
  - Billing
  - Payments
  - Recurring Revenue
  - Invoicing
  - Dunning
  - Revenue Recognition
url: >-
  https://raw.githubusercontent.com/api-evangelist/recurly/refs/heads/main/apis.yml
created: '2026-05-11'
modified: '2026-05-30'
specificationVersion: '0.19'
apis:
  - aid: recurly:v3-api
    name: Recurly v3 API
    description: >-
      Full REST API for managing accounts, subscriptions, plans, add-ons,
      coupons, invoices, line items, transactions, shipping, tax, and
      webhooks across a Recurly site. Authentication is HTTP Basic with a
      private API key as the username; clients pin an API version through
      the `Accept: application/vnd.recurly.<version>` header.
    humanURL: https://recurly.com/developers/api/
    baseURL: https://v3.recurly.com
    tags:
      - Subscriptions
      - Billing
      - Invoices
      - Accounts
      - Webhooks
